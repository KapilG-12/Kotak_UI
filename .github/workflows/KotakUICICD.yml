name: KOTAK_UI

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  BUILD_REQUIRED: "yes"
  PROJECT_TYPE: "angular"

jobs:
  escrow:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm ci

      - name: Build Angular
        run: npx ng build --configuration production

      - name: Generate Source Checksum
        run: |
          find . -type f ! -path './.git/*' | sort | xargs sha256sum > source_checksum.txt

      - name: Generate Build Checksum
        run: |
          BUILD_DIR=$(find dist -mindepth 1 -maxdepth 1 -type d | head -n 1)
          find "$BUILD_DIR" -type f | sort | xargs sha256sum > build_checksum.txt

      - name: Upload Escrow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: escrow-${{ github.run_id }}
          path: |
            source_checksum.txt
            build_checksum.txt
